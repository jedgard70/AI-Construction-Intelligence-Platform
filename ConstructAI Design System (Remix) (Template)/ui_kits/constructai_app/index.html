<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>ConstructAI · App UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { margin:0; padding:0; height:100%; background:#f4f5f7; }
  body { font-family: 'Geist', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="BrandMark.jsx"></script>
<script type="text/babel" src="LoginView.jsx"></script>
<script type="text/babel" src="SidebarNav.jsx"></script>
<script type="text/babel" src="DashboardPieces.jsx"></script>
<script type="text/babel" src="HelpButton.jsx"></script>
<script type="text/babel" src="DashboardView.jsx"></script>

<script type="text/babel">
function App() {
  const [authed, setAuthed] = React.useState(false);
  const [profile, setProfile] = React.useState({
    id: 'demo',
    email: 'demo@constructai.com.br',
    full_name: 'José Edgard de Oliveira',
    role: 'coordenador_projetos',
    company: 'Apex Global Ltda',
  });

  if (!authed) {
    return <LoginView onLogin={() => setAuthed(true)} />;
  }
  return <DashboardView
    profile={profile}
    onLogout={() => setAuthed(false)}
    onChangeRole={(role) => setProfile(p => ({...p, role}))}
  />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
