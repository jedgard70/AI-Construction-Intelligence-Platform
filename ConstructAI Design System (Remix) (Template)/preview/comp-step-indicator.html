<!doctype html><html lang="en"><meta charset="utf-8"><title>Step indicator</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans-app);padding:16px 20px}
  .row{display:flex;gap:5px;margin-bottom:12px}
  .step{flex:1;padding:8px 6px;border-radius:8px;text-align:center;font-size:11px;font-weight:500;border:1px solid}
  .done{border-color:#97C459;background:#EAF3DE;color:#3B6D11}
  .active{border-color:#185FA5;background:#E6F1FB;color:#185FA5}
  .todo{border-color:var(--app-border);background:#fff;color:#8b93a7}
  .lbl{font-size:9px;font-weight:600;color:var(--fg-4);text-transform:uppercase;letter-spacing:.06em;margin-top:14px}
</style>
<div class="row">
  <div class="step done">✓ 1. Tipo</div>
  <div class="step done">✓ 2. Contratado</div>
  <div class="step done">✓ 3. Partes</div>
  <div class="step active">4. Objeto</div>
  <div class="step todo">5. Valores</div>
  <div class="step todo">6. Revisão IA</div>
  <div class="step todo">7. Contrato</div>
</div>
<div class="lbl">Wizard step row · Jurídico module</div>
