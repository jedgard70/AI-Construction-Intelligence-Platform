<!doctype html><html lang="en"><meta charset="utf-8"><title>Project row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--app-bg);font-family:var(--font-sans-app);padding:16px}
  .card{background:#fff;border:1px solid var(--app-border);border-radius:12px;overflow:hidden}
  .head{padding:13px 16px;border-bottom:1px solid var(--app-border);font-size:13px;font-weight:600;color:#1a1f36}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead tr{background:#f8f9fc}
  th{padding:9px 14px;text-align:left;font-weight:600;color:#8b93a7;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--app-border)}
  td{padding:11px 14px}
  tr:nth-child(odd) td{background:#fafbfd}
  .name{font-weight:500;color:#1a1f36}
  .code{font-family:var(--font-mono);font-size:10px;color:#a0a8bb;margin-top:2px}
  .bar{display:flex;align-items:center;gap:8px}
  .barbg{width:70px;height:5px;background:var(--app-border);border-radius:3px;overflow:hidden}
  .barfg{height:100%;border-radius:3px}
  .pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
</style>
<div class="card">
  <div class="head">🗂 Projetos em andamento</div>
  <table>
    <thead><tr><th>Projeto</th><th>Localização</th><th>Progresso</th><th>CPI</th><th>Status</th></tr></thead>
    <tbody>
      <tr><td><div class="name">Ponte Av. Central</div><div class="code">OBR-2026-001</div></td>
        <td style="color:#5a6282">São Paulo, SP</td>
        <td><div class="bar"><div class="barbg"><div class="barfg" style="width:82%;background:#3B6D11"></div></div><span style="font-size:11px;font-weight:500;color:#3a4166">82%</span></div></td>
        <td style="color:#3B6D11;font-weight:500">1,02</td>
        <td><span class="pill" style="background:#185FA518;color:#185FA5">Em andamento</span></td></tr>
      <tr><td><div class="name">Torre B Comercial</div><div class="code">OBR-2026-002</div></td>
        <td style="color:#5a6282">Rio de Janeiro, RJ</td>
        <td><div class="bar"><div class="barbg"><div class="barfg" style="width:55%;background:#185FA5"></div></div><span style="font-size:11px;font-weight:500;color:#3a4166">55%</span></div></td>
        <td style="color:#A32D2D;font-weight:500">0,81</td>
        <td><span class="pill" style="background:#A32D2D18;color:#A32D2D">Atrasado</span></td></tr>
    </tbody>
  </table>
</div>
