<!doctype html><html lang="en"><meta charset="utf-8"><title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--app-bg);font-family:var(--font-sans-app)}
  .card{padding:20px;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
  .logo{width:120px;height:120px;border-radius:14px;overflow:hidden;background:var(--brand-navy);box-shadow:0 8px 24px rgba(26,42,74,.25);flex-shrink:0}
  .logo img{width:100%;height:100%;object-fit:cover;display:block}
  .meta dt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-4);margin-top:10px}
  .meta dt:first-child{margin-top:0}
  .meta dd{font-size:13px;color:var(--fg-1);margin:2px 0 0;font-weight:500}
  .swatches{display:flex;gap:6px;margin-top:6px}
  .sw{width:18px;height:18px;border-radius:4px;border:1px solid var(--app-border)}
</style>
<div class="card">
  <div class="logo"><img src="../assets/logo_apex_nova.jpeg" alt="Apex Global"></div>
  <dl class="meta">
    <dt>Mark</dt><dd>Apex Global · rooftop chevron + diagonal slash</dd>
    <dt>Operator</dt><dd>Apex Global Ltda · CNPJ 45.239.918/0001-26</dd>
    <dt>Field colors</dt>
    <dd>
      <div class="swatches">
        <span class="sw" style="background:#1a2a4a" title="Logo navy"></span>
        <span class="sw" style="background:#2858c8" title="Chevron blue"></span>
        <span class="sw" style="background:#A32D2D" title="Slash red"></span>
        <span class="sw" style="background:#ffffff" title="Wordmark"></span>
      </div>
    </dd>
    <dt>File</dt><dd style="font-family:var(--font-mono);font-size:12px">assets/logo_apex_nova.jpeg · 1024 × 1024</dd>
  </dl>
</div>
