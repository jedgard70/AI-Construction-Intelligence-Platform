<!doctype html><html lang="en"><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--app-bg);font-family:var(--font-sans-app);padding:16px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--app-border);background:#fff}
  .chip{height:74px;display:flex;align-items:flex-end;padding:10px}
  .meta{padding:8px 10px 10px}
  .name{font-size:12px;font-weight:600;color:var(--fg-1)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-4);margin-top:2px}
  .tag{font-size:9px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.08em}
</style>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#185FA5"><span class="tag">primary</span></div><div class="meta"><div class="name">Brand Blue</div><div class="hex">#185FA5</div></div></div>
  <div class="sw"><div class="chip" style="background:#0C447C"><span class="tag">pressed</span></div><div class="meta"><div class="name">Blue Deep</div><div class="hex">#0C447C</div></div></div>
  <div class="sw"><div class="chip" style="background:#f0a500"><span class="tag" style="color:#0a0d12">accent</span></div><div class="meta"><div class="name">Brand Amber</div><div class="hex">#f0a500</div></div></div>
  <div class="sw"><div class="chip" style="background:#A32D2D"><span class="tag">accent · danger</span></div><div class="meta"><div class="name">Brand Red</div><div class="hex">#A32D2D</div></div></div>
  <div class="sw"><div class="chip" style="background:#1a2a4a"><span class="tag">logo field</span></div><div class="meta"><div class="name">Brand Navy</div><div class="hex">#1a2a4a</div></div></div>
</div>
