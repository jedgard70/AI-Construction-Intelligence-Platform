<!doctype html><html lang="en"><meta charset="utf-8"><title>Role accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--app-bg);font-family:var(--font-sans-app);padding:16px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .role{background:#fff;border:1px solid var(--app-border);border-radius:10px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
  .em{font-size:18px}
  .lab{font-size:10px;font-weight:600;color:var(--fg-1);text-align:center;line-height:1.2}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}
</style>
<div class="grid">
  <div class="role"><div class="av" style="background:#534AB722;color:#534AB7"><span class="em">👑</span></div><div class="lab">Diretor<br>Executivo</div><div class="hex">#534AB7</div></div>
  <div class="role"><div class="av" style="background:#3B6D1122;color:#3B6D11"><span class="em">💲</span></div><div class="lab">Gestor<br>Financeiro</div><div class="hex">#3B6D11</div></div>
  <div class="role"><div class="av" style="background:#185FA522;color:#185FA5"><span class="em">📅</span></div><div class="lab">Coordenador<br>Projetos</div><div class="hex">#185FA5</div></div>
  <div class="role"><div class="av" style="background:#BA751722;color:#BA7517"><span class="em">🦺</span></div><div class="lab">Engenheiro<br>Campo</div><div class="hex">#BA7517</div></div>
  <div class="role"><div class="av" style="background:#A32D2D22;color:#A32D2D"><span class="em">🔍</span></div><div class="lab">Gestor<br>Qualidade</div><div class="hex">#A32D2D</div></div>
  <div class="role"><div class="av" style="background:#854F0B22;color:#854F0B"><span class="em">📈</span></div><div class="lab">Investidor<br>Sócio</div><div class="hex">#854F0B</div></div>
</div>
