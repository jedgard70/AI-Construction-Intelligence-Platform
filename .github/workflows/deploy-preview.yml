name: Deploy Preview (Vercel)

on:
  # PR previews are created automatically by the Vercel GitHub App.
  # This workflow is a manual fallback/diagnostic path for cases where
  # the GitHub App integration is unavailable.
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel Preview
    runs-on: ubuntu-latest

    steps:
      - name: Validate Vercel Actions configuration
        shell: bash
        env:
          VERCEL_CONFIGURED: ${{ vars.VERCEL_CONFIGURED }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=()

          if [ "${VERCEL_CONFIGURED}" != "true" ]; then
            echo "::error title=Missing VERCEL_CONFIGURED::Create repository variable VERCEL_CONFIGURED with value true."
            missing+=("Repository variable VERCEL_CONFIGURED=true")
          fi
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::error title=Missing VERCEL_TOKEN::Create repository secret VERCEL_TOKEN."
            missing+=("Repository secret VERCEL_TOKEN")
          fi
          if [ -z "${VERCEL_ORG_ID}" ]; then
            echo "::error title=Missing VERCEL_ORG_ID::Create repository secret VERCEL_ORG_ID."
            missing+=("Repository secret VERCEL_ORG_ID")
          fi
          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::error title=Missing VERCEL_PROJECT_ID::Create repository secret VERCEL_PROJECT_ID."
            missing+=("Repository secret VERCEL_PROJECT_ID")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Vercel Preview is not configured::Missing GitHub Actions configuration for Vercel Preview."
            echo "Missing required configuration:"
            printf ' - %s\n' "${missing[@]}"
            echo ""
            echo "Configure these in GitHub: Settings > Secrets and variables > Actions."
            echo "No secret values were printed."
            exit 1
          fi

          echo "Vercel Preview configuration is present. Secret values are masked and were not printed."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token="${VERCEL_TOKEN}")
          echo "preview_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "### Vercel Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "${URL}" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Vercel Preview READY: ${{ steps.deploy.outputs.preview_url }}`
            })
