name: CI — Build & Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'placeholder' }}

      - name: Report build size
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Route count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          ROUTES=$(cat .next/build-manifest.json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('pages',{})))" 2>/dev/null || echo "N/A")
          echo "| $ROUTES | ✅ Build OK |" >> $GITHUB_STEP_SUMMARY
